name: Build Kernel Module

on:
  push:
    branches: [ "main", "x86" ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: '选择编译目标分支'
        required: true
        default: 'main'
        type: choice
        options:
        - main
        - x86

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.target_branch || github.ref_name }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libelf-dev bc bison flex libssl-dev gcc-multilib

    - name: Prepare Kernel Source
      run: |
        wget -q https://cdn.kernel.org/pub/linux/kernel/v4.x/linux-4.14.186.tar.xz
        tar -xf linux-4.14.186.tar.xz
        mv linux-4.14.186 kernel_source
        mkdir -p kernel_source/drivers/hack
        cp -a kernel/. kernel_source/drivers/hack/

    - name: Build Module
      working-directory: ./kernel_source
      run: |
        # 1. 基础配置
        make ARCH=x86_64 x86_64_defconfig
        
        # 2. 仅关闭 Retpoline，不改动其他编译器参数
        sed -i 's/CONFIG_RETPOLINE=y/CONFIG_RETPOLINE=n/g' .config
        echo "CONFIG_RETPOLINE=n" >> .config
        
        # 3. 仅删除 -Werror，保留其他正常的 -W 参数
        find . -name "Makefile*" -exec sed -i 's/-Werror//g' {} +
        
        # 4. 关键：直接通过环境变量禁警告，而不是修改源码
        # 通过 KBUILD_CFLAGS="-Wno-error" 传递给编译器，这样最安全
        make ARCH=x86_64 \
             CC=gcc \
             KBUILD_CFLAGS="-Wno-error -Wno-implicit-function-declaration" \
             modules_prepare
             
        make ARCH=x86_64 \
             CC=gcc \
             KBUILD_CFLAGS="-Wno-error -Wno-implicit-function-declaration" \
             M=drivers/hack modules

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: driver-output
        path: kernel_source/drivers/hack/*.ko
