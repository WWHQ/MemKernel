name: Build Kernel Module

on:
  push:
    branches: [ "main", "x86" ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: '选择编译目标分支'
        required: true
        default: 'main'
        type: choice
        options:
        - main
        - x86

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.target_branch || github.ref_name }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libelf-dev bc bison flex libssl-dev gcc-multilib

    - name: Prepare Kernel Source
      run: |
        wget -q https://cdn.kernel.org/pub/linux/kernel/v4.x/linux-4.4.146.tar.xz
        tar -xf linux-4.4.146.tar.xz
        mv linux-4.4.146 kernel_source
        mkdir -p kernel_source/drivers/hack
        cp -a kernel/. kernel_source/drivers/hack/

    - name: Build Module
      working-directory: ./kernel_source
      run: |
        # 1. 设置版本号以通过 vermagic 校验
        sed -i 's/^VERSION = .*/VERSION = 4/' Makefile
        sed -i 's/^PATCHLEVEL = .*/PATCHLEVEL = 4/' Makefile
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 146/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION = /' Makefile

        # 2. 生成配置
        make ARCH=x86_64 x86_64_defconfig
        
        # 3. 【核心修正】强制禁用 CRC 校验和模块签名，这是解决 "no symbol version" 的关键
        sed -i 's/CONFIG_MODVERSIONS=y/# CONFIG_MODVERSIONS is not set/g' .config
        sed -i 's/CONFIG_MODULE_SIG=y/# CONFIG_MODULE_SIG is not set/g' .config
        echo "CONFIG_PREEMPT=y" >> .config
        make ARCH=x86_64 olddefconfig
        
        # 4. 准备编译环境
        make ARCH=x86_64 modules_prepare
        
        # 5. 编译模块
        make ARCH=x86_64 CC=gcc -C . M=$(pwd)/drivers/hack modules

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: driver-output-${{ github.event.inputs.target_branch || github.ref_name }}
        path: kernel_source/drivers/hack/*.ko
