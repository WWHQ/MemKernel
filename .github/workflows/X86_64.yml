name: Build Kernel Module

on:
  push:
    branches: [ "main", "x86" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libelf-dev bc bison flex libssl-dev gcc-multilib

    - name: Prepare Kernel Source
      run: |
        # 必须使用 4.4.x 的内核源码，否则 vermagic 永远无法匹配
        wget -q https://cdn.kernel.org/pub/linux/kernel/v4.x/linux-4.4.146.tar.xz
        tar -xf linux-4.4.146.tar.xz
        mv linux-4.4.146 kernel_source
        mkdir -p kernel_source/drivers/hack
        cp -a kernel/. kernel_source/drivers/hack/

    - name: Build Module
      working-directory: ./kernel_source
      run: |
        # 1. 使用 x86_64 架构配置
        make ARCH=x86_64 x86_64_defconfig
        
        # 2. 编译模块
        # 重点：不要改动 CONFIG_RETPOLINE，因为 4.4 内核可能根本没有这个选项
        # 直接编译，确保使用本地 gcc
        make ARCH=x86_64 \
             CC=gcc \
             -C . M=$(pwd)/drivers/hack modules

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: driver-output
        path: kernel_source/drivers/hack/*.ko
