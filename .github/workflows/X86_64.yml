name: Build Kernel Module

on:
  push:
    branches: [ "main", "x86" ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: '选择编译目标分支'
        required: true
        default: 'main'
        type: choice
        options:
        - main
        - x86

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.target_branch || github.ref_name }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libelf-dev bc bison flex libssl-dev gcc-multilib

    - name: Prepare Kernel Source
      run: |
        wget -q https://cdn.kernel.org/pub/linux/kernel/v4.x/linux-4.14.186.tar.xz
        tar -xf linux-4.14.186.tar.xz
        mv linux-4.14.186 kernel_source
        mkdir -p kernel_source/drivers/hack
        cp -a kernel/. kernel_source/drivers/hack/

    - name: Build Module
      working-directory: ./kernel_source
      run: |
        # 1. 生成基础配置
        make ARCH=x86_64 x86_64_defconfig
        
        # 2. 彻底禁用 Retpoline 检查 (绕过 modern 编译器兼容性限制)
        sed -i 's/CONFIG_RETPOLINE=y/CONFIG_RETPOLINE=n/g' .config
        echo "CONFIG_RETPOLINE=n" >> .config
        
        # 3. 深度清理所有 Makefile 中的 -Werror，防止编译器因警告中断
        find . -type f \( -name "Makefile" -o -name "Makefile.*" \) -exec sed -i 's/-Werror//g' {} +
        
        # 4. 准备编译环境
        make ARCH=x86_64 modules_prepare
        
        # 5. 执行编译
        # 使用 KCFLAGS 和 KBUILD_CFLAGS 强制忽略警告
        make ARCH=x86_64 \
             KCFLAGS="-Wno-error" \
             KBUILD_CFLAGS="-Wno-error" \
             HOSTCFLAGS="-Wno-error" \
             CONFIG_RETPOLINE=n \
             -j$(nproc) \
             M=drivers/hack modules

    - name: Debug Output
      if: always()
      run: |
        echo "编译完成或失败，检查 drivers/hack 目录内容："
        ls -l kernel_source/drivers/hack/

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: driver-output-${{ github.event.inputs.target_branch || github.ref_name }}
        path: kernel_source/drivers/hack/*.ko
