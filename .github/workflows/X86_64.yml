name: Build Kernel Module

on:
  push:
    branches: [ "main", "x86" ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: '选择编译目标分支'
        required: true
        default: 'main'
        type: choice
        options:
        - main
        - x86

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.target_branch || github.ref_name }}

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libelf-dev bc bison flex libssl-dev gcc-multilib

    - name: Prepare Kernel Source
      run: |
        wget -q https://cdn.kernel.org/pub/linux/kernel/v4.x/linux-4.14.186.tar.xz
        tar -xf linux-4.14.186.tar.xz
        mv linux-4.14.186 kernel_source
        mkdir -p kernel_source/drivers/hack
        cp -a kernel/. kernel_source/drivers/hack/

    - name: Build Module
      working-directory: ./kernel_source
      run: |
        # 1. 生成配置
        make ARCH=x86_64 x86_64_defconfig
        
        # 2. 禁用 Retpoline
        sed -i 's/CONFIG_RETPOLINE=y/CONFIG_RETPOLINE=n/g' .config
        echo "CONFIG_RETPOLINE=n" >> .config
        
        # 3. 【暴力清理】删除所有编译器警告标志
        # 该操作会删除所有 '-W' 开头的参数，彻底解决编译器版本不兼容引起的参数报错
        find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "Makefile.*" \) -exec sed -i 's/-W[a-z-]*//g' {} +
        # 额外处理可能存在的非法拼写
        find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "Makefile.*" \) -exec sed -i 's/-implicit-function-declaration//g' {} +
        
        # 4. 准备编译环境
        make ARCH=x86_64 CC=gcc modules_prepare
        
        # 5. 执行编译
        make ARCH=x86_64 CC=gcc -j$(nproc) M=drivers/hack modules

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: driver-output-${{ github.event.inputs.target_branch || github.ref_name }}
        path: kernel_source/drivers/hack/*.ko
